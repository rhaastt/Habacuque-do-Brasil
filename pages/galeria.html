<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Associação Habacuque do Brasil — Galeria</title>
    <link rel="icon" href="../imagens//logos/logo-preto.svg" type="image/svg+xml" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="../imagens//logos/logo-branco.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)" />
    <link href="../css/reset.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="../css/theme-institucional.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="../components/site-header.js" defer></script>
    <script src="../components/site-sidebar.js" defer></script>
    <script src="../components/site-footer.js" defer></script>
    <script src="../components/scroll-carousel.js" defer></script>
    <script src="../components/motion-reveal.js" defer></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.lucide && typeof window.lucide.createIcons === "function") {
          window.lucide.createIcons();
        }
      });
    </script>
  </head>
  <body class="overflow-x-hidden">
    <div class="drawer drawer-end">
